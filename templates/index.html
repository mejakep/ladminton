<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    
    <link href="/static/style.css" rel="stylesheet">
    <title>Ladminton</title>
</head>
<body class="bg-light">

<div class="container py-4">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">🏸 Ladminton</h1>
        <p class="text-muted">Badminton Score Tracker</p>
    </div>

    <!-- Add Score Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h3 class="card-title mb-4">Add Match Result</h3>

            <div class="row g-4">

                <!-- Curtain Side -->
                <div class="col-6">
                    <label class="form-label fw-bold">Curtain Side</label>

                    <div class="d-flex flex-wrap gap-2">

                        <input type="checkbox" class="btn-check curtain-player" id="c-jp" value="JP">
                        <label class="btn btn-outline-primary" for="c-jp">JP</label>

                        <input type="checkbox" class="btn-check curtain-player" id="c-jh" value="JH">
                        <label class="btn btn-outline-primary" for="c-jh">JH</label>

                        <input type="checkbox" class="btn-check curtain-player" id="c-dj" value="DJ">
                        <label class="btn btn-outline-primary" for="c-dj">DJ</label>

                        <input type="checkbox" class="btn-check curtain-player" id="c-js" value="JS">
                        <label class="btn btn-outline-primary" for="c-js">JS</label>

                        <input type="checkbox" class="btn-check curtain-player" id="c-su" value="SU">
                        <label class="btn btn-outline-primary" for="c-su">SU</label>

                    </div>
                </div>

                <!-- Door Side -->
                <div class="col-6">
                    <label class="form-label fw-bold">Door Side</label>

                    <div class="d-flex flex-wrap gap-2">

                        <input type="checkbox" class="btn-check door-player" id="d-jp" value="JP">
                        <label class="btn btn-outline-danger" for="d-jp">JP</label>

                        <input type="checkbox" class="btn-check door-player" id="d-jh" value="JH">
                        <label class="btn btn-outline-danger" for="d-jh">JH</label>

                        <input type="checkbox" class="btn-check door-player" id="d-dj" value="DJ">
                        <label class="btn btn-outline-danger" for="d-dj">DJ</label>

                        <input type="checkbox" class="btn-check door-player" id="d-js" value="JS">
                        <label class="btn btn-outline-danger" for="d-js">JS</label>

                        <input type="checkbox" class="btn-check door-player" id="d-su" value="SU">
                        <label class="btn btn-outline-danger" for="d-su">SU</label>

                    </div>
                </div>

            </div>

            <!-- Scores -->
            <div class="row g-3 mt-3">

                <div class="col-6">
                    <label class="form-label">Curtain Score</label>
                    <input
                        type="number"
                        id="curtain_score"
                        class="form-control"
                        min="0"
                    >
                </div>

                <div class="col-6">
                    <label class="form-label">Door Score</label>
                    <input
                        type="number"
                        id="door_score"
                        class="form-control"
                        min="0"
                    >
                </div>

            </div>

            <!-- Notes -->
            <div class="row mt-3">
                <div class="col-12">
                    <label class="form-label"></label>
                    <input
                        type="text"
                        id="notes"
                        class="form-control"
                        placeholder="Notes (optional)"
                    >
                </div>
            </div>

            <div class="mt-4 d-grid">
                <button
                    class="btn btn-primary btn-lg"
                    onclick="submitRecord()"
                >
                    Save Match
                </button>
            </div>

        </div>
    </div>

    <!-- Scores Table -->
    <div class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="card-title mb-0">Today's Scores</h3>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle score-table">

                    <colgroup>
                        <col style="width: 35%">
                        <col style="width: 30%">
                        <col style="width: 35%">
                    </colgroup>

                    <thead class="table-dark">
                        <tr>
                            <th class="text-center">Curtain</th>

                            <th class="text-center">Score</th>

                            <th class="text-center">Door</th>
                        </tr>
                    </thead>

                    <tbody id="scores"></tbody>

                </table>
            </div>
        </div>
    </div>

</div>

<script>
async function submitRecord() {
    const curtain_players = Array.from(
        document.querySelectorAll('.curtain-player:checked')
    ).map(p => p.value).join('/');

    const door_players = Array.from(
        document.querySelectorAll('.door-player:checked')
    ).map(p => p.value).join('/');

    const curtain_score =
        document.getElementById('curtain_score').valueAsNumber;

    const door_score =
        document.getElementById('door_score').valueAsNumber;

    const notes =
        document.getElementById('notes').value;

    await fetch('/api/scores', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            curtain_players,
            door_players,
            curtain_score,
            door_score,
            notes
        })
    });

    window.location.reload();
}

async function loadScores() {
    const response = await fetch('/api/scores');
    const scores = await response.json();

    const table = document.getElementById('scores');

    table.innerHTML = '';

    scores.forEach(score => {

        const row = document.createElement('tr');

        const curtainWon = score.curtain_score > score.door_score;

        row.innerHTML = `
            <td class="player-cell ${curtainWon ? 'fw-bold text-success' : ''}">
                ${score.curtain_players}
            </td>

            <td class="score-cell">
                ${score.curtain_score}
                <span class="text-muted mx-1">-</span>
                ${score.door_score}
            </td>

            <td class="player-cell ${!curtainWon ? 'fw-bold text-success' : ''}">
                ${score.door_players}
            </td>
        `;

        table.appendChild(row);
    });
}

loadScores();
</script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
